<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso VIP - IA Inmobiliaria</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* DISEÑO INTEGRADO PARA EVITAR ERRORES DE RUTA */
        :root {
            --bg-dark: #0a0a0a;
            --card-bg: #141414;
            --accent-purple: #8257e5;
            --text-main: #ffffff;
            --text-muted: #a0a0a0;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .auth-container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }

        .auth-box {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        h2 { margin-bottom: 10px; font-size: 24px; }
        p { color: var(--text-muted); margin-bottom: 30px; font-size: 14px; }

        .google-btn {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #333;
            background: white;
            color: #000;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: 0.3s;
        }

        .google-btn:hover { background: #f1f1f1; transform: translateY(-2px); }

        .divider {
            margin: 25px 0;
            display: flex;
            align-items: center;
            color: var(--text-muted);
            font-size: 12px;
        }

        .divider::before, .divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: rgba(255,255,255,0.1);
            margin: 0 10px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            background: #000;
            border: 1px solid #333;
            border-radius: 8px;
            color: white;
            box-sizing: border-box;
        }

        .cta-button {
            width: 100%;
            padding: 14px;
            background: var(--accent-purple);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .cta-button:hover { background: #9466ff; box-shadow: 0 0 20px rgba(130, 87, 229, 0.4); }

        .toggle-auth { margin-top: 20px; font-size: 14px; color: var(--text-muted); }
        .toggle-auth a { color: var(--accent-purple); text-decoration: none; font-weight: bold; }
        
        .back-link {
            display: block;
            margin-bottom: 20px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Volver a la web</a>
        <div class="auth-box">
            <h2>Bienvenido</h2>
            <p>Accede para gestionar tu Master Kit</p>

            <button id="btn-google" class="google-btn">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20" alt="G">
                Continuar con Google
            </button>

            <div class="divider"><span>o con tu email</span></div>

            <form id="auth-form">
                <input type="email" id="email" placeholder="Email" required>
                <input type="password" id="password" placeholder="Contraseña" required>
                <button type="submit" id="btn-main" class="cta-button">Entrar ahora</button>
            </form>
            
            <p class="toggle-auth">¿No tienes cuenta? <a href="#" id="toggle-link">Regístrate</a></p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBGCs8QJtlIXXWnhOIpRjGsGf5Su5uYzbs",
            authDomain: "ia-inmobiliaria-e9451.firebaseapp.com",
            projectId: "ia-inmobiliaria-e9451",
            storageBucket: "ia-inmobiliaria-e9451.firebasestorage.app",
            messagingSenderId: "391661757735",
            appId: "1:391661757735:web:9f1ae78ffd683c1e9bb502"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const googleProvider = new GoogleAuthProvider();

        const form = document.getElementById('auth-form');
        const btnMain = document.getElementById('btn-main');
        const btnGoogle = document.getElementById('btn-google');
        const toggleLink = document.getElementById('toggle-link');
        let isLogin = true;

        const redireccionInteligente = () => {
            const haPagado = localStorage.getItem('pago_pendiente') === 'true' || localStorage.getItem('pago_exitoso') === 'true';
            window.location.href = haPagado ? "exito.html" : "index.html";
        };

        btnGoogle.addEventListener('click', () => {
            signInWithPopup(auth, googleProvider).then((result) => {
                localStorage.setItem('ia_user', result.user.email);
                redireccionInteligente();
            }).catch(err => alert("Error: " + err.message));
        });

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            btnMain.innerText = "Cargando...";

            if (isLogin) {
                signInWithEmailAndPassword(auth, email, password).then(() => {
                    localStorage.setItem('ia_user', email);
                    redireccionInteligente();
                }).catch(err => { alert("Error: " + err.message); btnMain.innerText = "Entrar"; });
            } else {
                createUserWithEmailAndPassword(auth, email, password).then(() => {
                    localStorage.setItem('ia_user', email);
                    redireccionInteligente();
                }).catch(err => { alert("Error: " + err.message); btnMain.innerText = "Crear Cuenta"; });
            }
        });

        toggleLink.addEventListener('click', (e) => {
            e.preventDefault();
            isLogin = !isLogin;
            btnMain.innerText = isLogin ? "Entrar ahora" : "Crear Cuenta";
            toggleLink.innerText = isLogin ? "Regístrate" : "Inicia Sesión";
        });
    </script>
</body>
</html>
