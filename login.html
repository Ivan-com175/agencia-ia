<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso VIP - IA Inmobiliaria</title>
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/2083/2083213.png" type="image/png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* RECUPERANDO TU INTERFAZ ORIGINAL */
        :root {
            --bg-dark: #0a0a0a;
            --accent-purple: #8257e5;
            --accent-cyan: #00f2ff;
            --text-main: #ffffff;
            --text-muted: #a0a0a0;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 20% 35%, rgba(130, 87, 229, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 65%, rgba(0, 242, 255, 0.1) 0%, transparent 40%);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .auth-container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .auth-box {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid var(--glass-border);
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 14px;
            margin-bottom: 24px;
            transition: 0.3s;
        }

        .back-link:hover { color: var(--text-main); }

        h2 { font-size: 28px; font-weight: 800; margin-bottom: 8px; letter-spacing: -0.5px; }
        p { color: var(--text-muted); margin-bottom: 32px; font-size: 15px; }

        .google-btn {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            background: white;
            color: #000;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .google-btn:hover {
            background: #f8f8f8;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(255,255,255,0.1);
        }

        .divider {
            margin: 24px 0;
            display: flex;
            align-items: center;
            color: var(--text-muted);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .divider::before, .divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: var(--glass-border);
            margin: 0 16px;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            margin-bottom: 16px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: white;
            font-size: 15px;
            transition: 0.3s;
            box-sizing: border-box;
        }

        input:focus {
            outline: none;
            border-color: var(--accent-purple);
            background: rgba(0, 0, 0, 0.5);
            box-shadow: 0 0 0 4px rgba(130, 87, 229, 0.1);
        }

        .cta-button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--accent-purple), #9466ff);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 8px;
        }

        .cta-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(130, 87, 229, 0.4);
        }

        .toggle-auth { margin-top: 24px; font-size: 14px; color: var(--text-muted); }
        .toggle-auth a { color: var(--accent-cyan); text-decoration: none; font-weight: 600; }
        .toggle-auth a:hover { text-decoration: underline; }

    </style>
</head>
<body>
    <div class="auth-container">
        <a href="index.html" class="back-link"><i class="fas fa-chevron-left"></i> Volver a la web principal</a>
        
        <div class="auth-box">
            <h2>Bienvenido</h2>
            <p>Accede para gestionar tu Master Kit</p>

            <button id="btn-google" class="google-btn">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18" alt="G">
                Continuar con Google
            </button>

            <div class="divider"><span>O usa tu correo</span></div>

            <form id="auth-form">
                <input type="email" id="email" placeholder="Correo electrónico" required>
                <input type="password" id="password" placeholder="Contraseña" required>
                <button type="submit" id="btn-main" class="cta-button">Entrar ahora</button>
            </form>
            
            <p class="toggle-auth">¿No tienes cuenta? <a href="#" id="toggle-link">Regístrate gratis</a></p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBGCs8QJtlIXXWnhOIpRjGsGf5Su5uYzbs",
            authDomain: "ia-inmobiliaria-e9451.firebaseapp.com",
            projectId: "ia-inmobiliaria-e9451",
            storageBucket: "ia-inmobiliaria-e9451.firebasestorage.app",
            messagingSenderId: "391661757735",
            appId: "1:391661757735:web:9f1ae78ffd683c1e9bb502"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const googleProvider = new GoogleAuthProvider();

        const form = document.getElementById('auth-form');
        const btnMain = document.getElementById('btn-main');
        const btnGoogle = document.getElementById('btn-google');
        const toggleLink = document.getElementById('toggle-link');
        let isLogin = true;

        const redireccionInteligente = () => {
            const haPagado = localStorage.getItem('pago_pendiente') === 'true' || localStorage.getItem('pago_exitoso') === 'true';
            window.location.href = haPagado ? "exito.html" : "index.html";
        };

        btnGoogle.addEventListener('click', () => {
            signInWithPopup(auth, googleProvider).then((result) => {
                localStorage.setItem('ia_user', result.user.email);
                redireccionInteligente();
            }).catch(err => alert("Error: " + err.message));
        });

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            btnMain.innerText = "Verificando...";

            if (isLogin) {
                signInWithEmailAndPassword(auth, email, password).then(() => {
                    localStorage.setItem('ia_user', email);
                    redireccionInteligente();
                }).catch(err => { alert("Error: " + err.message); btnMain.innerText = "Entrar ahora"; });
            } else {
                createUserWithEmailAndPassword(auth, email, password).then(() => {
                    localStorage.setItem('ia_user', email);
                    redireccionInteligente();
                }).catch(err => { alert("Error: " + err.message); btnMain.innerText = "Crear Cuenta"; });
            }
        });

        toggleLink.addEventListener('click', (e) => {
            e.preventDefault();
            isLogin = !isLogin;
            btnMain.innerText = isLogin ? "Entrar ahora" : "Crear Cuenta";
            toggleLink.innerText = isLogin ? "Regístrate gratis" : "Inicia Sesión";
        });
    </script>
</body>
</html>
