<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso VIP - IA Inmobiliaria</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="auth-page">
    <div class="auth-container">
        <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Volver</a>
        <div class="auth-box">
            <h2>Bienvenido</h2>
            <p>Accede para gestionar tu Master Kit</p>
            <button id="btn-google" class="google-btn">
                <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" alt="Google">
                Continuar con Google
            </button>
            <div class="divider"><span>o con tu email</span></div>
            <form id="auth-form">
                <input type="email" id="email" placeholder="Email" required>
                <input type="password" id="password" placeholder="Contraseña" required>
                <button type="submit" id="btn-main" class="cta-button full-width">Entrar</button>
            </form>
            <p class="toggle-auth">¿No tienes cuenta? <a href="#" id="toggle-link">Regístrate</a></p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBGCs8QJtlIXXWnhOIpRjGsGf5Su5uYzbs",
            authDomain: "ia-inmobiliaria-e9451.firebaseapp.com",
            projectId: "ia-inmobiliaria-e9451",
            storageBucket: "ia-inmobiliaria-e9451.firebasestorage.app",
            messagingSenderId: "391661757735",
            appId: "1:391661757735:web:9f1ae78ffd683c1e9bb502"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const googleProvider = new GoogleAuthProvider();

        const form = document.getElementById('auth-form');
        const btnMain = document.getElementById('btn-main');
        const btnGoogle = document.getElementById('btn-google');
        const toggleLink = document.getElementById('toggle-link');
        let isLogin = true;

        const redireccionInteligente = () => {
            const haPagado = localStorage.getItem('pago_pendiente') === 'true' || localStorage.getItem('pago_exitoso') === 'true';
            window.location.href = haPagado ? "exito.html" : "index.html";
        };

        btnGoogle.addEventListener('click', () => {
            signInWithPopup(auth, googleProvider).then((result) => {
                localStorage.setItem('ia_user', result.user.email);
                redireccionInteligente();
            }).catch(err => alert("Error: " + err.message));
        });

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            if (isLogin) {
                signInWithEmailAndPassword(auth, email, password).then(() => {
                    localStorage.setItem('ia_user', email);
                    redireccionInteligente();
                }).catch(err => alert("Error: " + err.message));
            } else {
                createUserWithEmailAndPassword(auth, email, password).then(() => {
                    localStorage.setItem('ia_user', email);
                    redireccionInteligente();
                }).catch(err => alert("Error: " + err.message));
            }
        });

        toggleLink.addEventListener('click', (e) => {
            e.preventDefault();
            isLogin = !isLogin;
            btnMain.innerText = isLogin ? "Entrar" : "Crear Cuenta";
            toggleLink.innerText = isLogin ? "Regístrate" : "Inicia Sesión";
        });
    </script>
</body>
</html>
