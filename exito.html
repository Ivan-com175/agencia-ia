<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zona VIP - IA Inmobiliaria</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>body { display: none; background: #0a0a0a; color: white; }</style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBGCs8QJtlIXXWnhOIpRjGsGf5Su5uYzbs",
            authDomain: "ia-inmobiliaria-e9451.firebaseapp.com",
            projectId: "ia-inmobiliaria-e9451",
            storageBucket: "ia-inmobiliaria-e9451.firebasestorage.app",
            messagingSenderId: "391661757735",
            appId: "1:391661757735:web:9f1ae78ffd683c1e9bb502"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function verificarSeguridad() {
            const urlParams = new URLSearchParams(window.location.search);
            const vieneDePagar = urlParams.get('pago') === 'completado';
            const email = localStorage.getItem('ia_user');

            if (vieneDePagar && !email) {
                localStorage.setItem('pago_pendiente', 'true');
                window.location.replace("login.html");
                return;
            }

            if (!email) {
                window.location.replace("login.html");
                return;
            }

            if (vieneDePagar || localStorage.getItem('pago_pendiente') === 'true') {
                await setDoc(doc(db, "clientes_vip", email), { pagado: true, fecha: new Date().toISOString() }, { merge: true });
                localStorage.removeItem('pago_pendiente');
                localStorage.setItem('pago_exitoso', 'true');
                window.history.replaceState(null, null, window.location.pathname);
            }

            const docSnap = await getDoc(doc(db, "clientes_vip", email));
            if (docSnap.exists() && docSnap.data().pagado === true) {
                document.body.style.display = "block";
            } else {
                window.location.replace("index.html");
            }
        }
        verificarSeguridad();
    </script>
</head>
<body class="auth-page">
    <header class="glass-header">
        <div class="container header-content" style="justify-content: center;">
            <a href="producto.html" class="logo">
                <i class="fas fa-house-user"></i>
                <h2>IA Inmobiliaria</h2>
            </a>
        </div>
    </header>

    <section class="success-section">
        <div class="success-card">
            <div class="success-icon"><i class="fas fa-crown" style="color: #ffd700;"></i></div>
            <h1>Acceso VIP Confirmado</h1>
            <p>Tu Master Kit ya está listo para descargar.</p>

            <div class="download-box" style="background: rgba(255,255,255,0.03); padding: 30px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); margin-top: 20px;">
                <i class="fas fa-file-pdf" style="font-size: 3.5em; color: #ff4d4d; margin-bottom: 15px;"></i>
                <h3 style="margin-bottom: 5px;">Master Kit IA Inmobiliaria</h3>
                <p style="font-size: 0.9em; opacity: 0.7;">Versión Final 2026</p>
                <a href="Master_Kit_IA_Inmobiliaria.pdf" download class="cta-button full-width large" style="margin-top:25px; text-decoration:none; display: flex; align-items: center; justify-content: center; gap: 10px;">
                    DESCARGAR KIT <i class="fas fa-download"></i>
                </a>
            </div>
            <a href="index.html" style="color:rgba(255,255,255,0.4); display:block; margin-top:30px; font-size: 0.9em; text-decoration: none;">← Volver a la web principal</a>
        </div>
    </section>
</body>
</html>
